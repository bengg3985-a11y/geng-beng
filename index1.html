<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моё мини-приложение</title>
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--tg-theme-text-color, #000000);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            opacity: 0.8;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Форма обратной связи</h1>
        
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Ваше имя:</label>
                <input type="text" id="name" name="name" placeholder="Введите имя" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Введите email" required>
            </div>
            
            <div class="form-group">
                <label for="message">Сообщение:</label>
                <textarea id="message" name="message" rows="4" placeholder="Введите сообщение" required></textarea>
            </div>
            
            <button type="submit">📤 Отправить данные боту</button>
        </form>
        
        <div id="result">
            <h3>✅ Данные отправлены!</h3>
            <p>Бот обработает вашу информацию и ответит в чат.</p>
        </div>
    </div>

    <script>
        // Получаем объект WebApp
        const tg = window.Telegram.WebApp;
        
        // Сообщаем Telegram, что приложение готово
        tg.ready();
        
        // Расширяем приложение на весь экран
        tg.expand();
        
        // Настраиваем основную кнопку (она появляется внизу)
        tg.MainButton.setText('Закрыть');
        tg.MainButton.onClick(() => {
            tg.close();
        });

        // Обработка отправки формы
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Собираем данные формы
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };
            
            // Отправляем данные боту
            tg.sendData(JSON.stringify(formData));
            
            // Показываем сообщение об успехе
            document.getElementById('result').style.display = 'block';
            
            // Показываем кнопку "Закрыть"
            tg.MainButton.show();
        });

        // Показываем информацию о пользователе (если доступна)
        const user = tg.initDataUnsafe?.user;
        if (user) {
            console.log('Пользователь:', user);
            // Можно автоматически заполнить имя, если хотите
            // document.getElementById('name').value = user.first_name || '';
        }
    </script>
</body>
</html>
